<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>{% if page.title %}{{ page.title }} — {% endif %}{{ site.title }}</title>
<meta name="description" content="{{ page.excerpt | default: site.description | strip_html | truncate: 160 }}">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Instrument+Serif:ital@0;1&family=Inter:wght@400;500;600&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<link rel="stylesheet" href="{{ '/assets/css/style.css' | relative_url }}">
<link rel="alternate" type="application/rss+xml" title="{{ site.title }}" href="{{ '/feed.xml' | relative_url }}">
</head>
<body>

<header class="site-nav">
  <div class="wrap">
    <a href="{{ '/' | relative_url }}" class="brand">{{ site.author | upcase }} <span>·</span> LAB NOTES</a>
    <nav>
      <a href="{{ '/' | relative_url }}">Posts</a>
      <a href="{{ '/about/' | relative_url }}">About</a>
      <a href="mailto:{{ site.email }}">Contact</a>
    </nav>
  </div>
</header>

{{ content }}

<footer>
  <div class="wrap">
    © {{ site.time | date: '%Y' }} {{ site.author }} · <a href="https://github.com/{{ site.github_username }}">GitHub</a> · <a href="{{ '/feed.xml' | relative_url }}">RSS</a>
  </div>
</footer>

</body>
</html>
